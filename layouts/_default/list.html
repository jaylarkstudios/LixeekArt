{{ define "main" }}
  <section class="page-header">
    <h1>{{ .Title }}</h1>
    {{ with .Description }}<p class="page-description">{{ . }}</p>{{ end }}
  </section>

  {{ $paginator := .Paginate (.Pages.ByDate.Reverse) }}
  <div class="post-list">
    {{ range $paginator.Pages }}
      {{ partial "post-card.html" . }}
    {{ end }}
  </div>

  {{ partial "pagination.html" . }}
{{ end }}
