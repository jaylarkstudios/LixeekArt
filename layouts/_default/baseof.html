<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
  {{ partial "head.html" . }}
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to content</a>
  {{ partial "header.html" . }}
  <main id="main-content" class="content-wrapper">
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}

  <button class="back-to-top" aria-label="Back to top">&uarr;</button>

  <div class="lightbox-overlay" role="dialog" aria-label="Image viewer">
    <button class="lightbox-close" aria-label="Close image viewer">&times;</button>
    <img src="" alt="">
  </div>

  <script>
    // Mobile menu toggle
    (function() {
      var toggle = document.querySelector('.nav-toggle');
      var menu = document.querySelector('.nav-menu');
      if (toggle && menu) {
        toggle.addEventListener('click', function() {
          toggle.classList.toggle('open');
          menu.classList.toggle('open');
        });
      }
    })();

    // Back to top
    (function() {
      var btn = document.querySelector('.back-to-top');
      if (!btn) return;
      window.addEventListener('scroll', function() {
        if (window.scrollY > 400) {
          btn.classList.add('visible');
        } else {
          btn.classList.remove('visible');
        }
      });
      btn.addEventListener('click', function() {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    })();

    // Lightbox
    (function() {
      var overlay = document.querySelector('.lightbox-overlay');
      var lbImg = overlay ? overlay.querySelector('img') : null;
      var closeBtn = overlay ? overlay.querySelector('.lightbox-close') : null;
      if (!overlay || !lbImg) return;

      document.querySelectorAll('.post-single-content img, .post-single-thumbnail').forEach(function(img) {
        img.addEventListener('click', function() {
          lbImg.src = this.src;
          lbImg.alt = this.alt;
          overlay.classList.add('active');
          document.body.style.overflow = 'hidden';
        });
      });

      function closeLightbox() {
        overlay.classList.remove('active');
        document.body.style.overflow = '';
        lbImg.src = '';
      }

      overlay.addEventListener('click', function(e) {
        if (e.target === overlay) closeLightbox();
      });
      if (closeBtn) closeBtn.addEventListener('click', closeLightbox);

      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && overlay.classList.contains('active')) {
          closeLightbox();
        }
      });
    })();
  </script>
</body>
</html>
