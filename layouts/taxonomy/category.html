{{ define "main" }}
  <section class="page-header">
    <h1>{{ .Title }}</h1>
    <p class="page-description">{{ len .Pages }} {{ if eq (len .Pages) 1 }}post{{ else }}posts{{ end }}</p>
  </section>

  {{ $paginator := .Paginate (.Pages.ByDate.Reverse) }}
  <div class="post-list">
    {{ range $paginator.Pages }}
      {{ partial "post-card.html" . }}
    {{ end }}
  </div>

  {{ partial "pagination.html" . }}
{{ end }}
