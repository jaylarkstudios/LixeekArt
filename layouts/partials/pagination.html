{{ $paginator := .Paginator }}
{{ if gt $paginator.TotalPages 1 }}
  <nav class="pagination" aria-label="Page navigation">
    {{ if $paginator.HasPrev }}
      <a href="{{ $paginator.First.URL }}">First</a>
      <a href="{{ $paginator.Prev.URL }}">&laquo; Newer</a>
    {{ else }}
      <span class="disabled">First</span>
      <span class="disabled">&laquo; Newer</span>
    {{ end }}

    <span class="page-info">Page {{ $paginator.PageNumber }} of {{ $paginator.TotalPages }}</span>

    {{ if $paginator.HasNext }}
      <a href="{{ $paginator.Next.URL }}">Older &raquo;</a>
      <a href="{{ $paginator.Last.URL }}">Last</a>
    {{ else }}
      <span class="disabled">Older &raquo;</span>
      <span class="disabled">Last</span>
    {{ end }}
  </nav>
{{ end }}
